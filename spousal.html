<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FitBaus 家庭对比入口</title>
  <meta http-equiv="refresh" content="0; url=index.html?view=family">
  <script>
    (function () {
      const url = new URL(window.location.href)
      const target = new URL("index.html", url)
      url.searchParams.forEach((value, key) => target.searchParams.set(key, value))
      target.searchParams.set("view", "family")
      window.location.replace(target.toString())
    })()
  </script>
</head>
<body>
  <p>正在跳转到统一仪表盘的家庭对比视图。如果没有自动跳转，请打开 <a href="index.html?view=family">家庭视图</a>。</p>
</body>
</html>
