services:
  fitbaus:
    build: .
    container_name: fitbaus-app
    # On Linux bind mounts, prefer running as the host user to avoid write failures
    user: "${FITBAUS_UID:-1000}:${FITBAUS_GID:-1000}"
    ports:
      - "${FITBAUS_BIND_HOST:-0.0.0.0}:${FITBAUS_PORT:-9000}:9000"   # Web UI (host:container)
      # - "${FITBAUS_CALLBACK_BIND_HOST:-0.0.0.0}:8080:8080" # Optional: local HTTPS callback port for background OAuth
    volumes:
      # Mount data directories to persist data
      - ./profiles:/app/profiles
    environment:
      - PYTHONIOENCODING=utf-8
      - TZ=Etc/UTC        # Use UTC timezone for consistency
      # - FITBIT_REDIRECT_URI=https://localhost:8080/callback   # Optional for background OAuth
      # - FITBIT_SSL_CERT=/certs/cert.pem                      # Optional TLS for background OAuth
      # - FITBIT_SSL_KEY=/certs/key.pem                        # Optional TLS for background OAuth
    # volumes:
    #   - ./certs:/certs:ro   # If using background OAuth with local HTTPS
    restart: unless-stopped
    # Remove stdin_open and tty for production
    # To access the container for setup, use: docker exec -it fitbaus-app bash
